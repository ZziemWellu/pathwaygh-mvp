<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Pathway AI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #1a5f2b;
            color: white;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            color: #333;
        }
        h1 { color: #1a5f2b; }
        .emoji { font-size: 64px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #1a5f2b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">📡</div>
        <h1>You're Offline</h1>
        <p>Don't worry! You can still access your downloaded content.</p>
        <p style="color: #666;">Check your internet connection and try again.</p>
        <a href="/" class="btn">Retry Connection</a>
    </div>
</body>
</html>
